<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCTC Reselling Inventory Tracker</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header>
    <h1><span>JCTC</span> Inventory Tracker</h1>
    <div class="header-actions">
      <button class="btn" onclick="exportData()">Export JSON</button>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">Import JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      <button class="btn btn-primary" onclick="showLotModal()">+ New Lot</button>
      <button class="btn btn-primary" onclick="showItemModal()">+ New Item</button>
    </div>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="dashboard">Dashboard</div>
    <div class="tab" data-tab="all">All Inventory</div>
    <div class="tab" data-tab="open">Open Inventory</div>
    <div class="tab" data-tab="sold">Sold Items</div>
    <div class="tab" data-tab="lots">Lots / Pallets</div>
  </div>

  <!-- Dashboard View -->
  <div id="view-dashboard" class="view">
    <div class="dashboard" id="dashboardStats"></div>
    <h3 style="margin:16px 0 12px;font-size:15px;">Recent Activity</h3>
    <div class="table-wrap" id="recentTable"></div>
  </div>

  <!-- All Inventory View -->
  <div id="view-all" class="view" style="display:none">
    <div class="toolbar">
      <input type="search" id="searchAll" placeholder="Search by brand, model, SKU..." oninput="renderAll()">
      <select id="filterLot" onchange="renderAll()"><option value="">All Lots</option></select>
      <select id="filterStatus" onchange="renderAll()">
        <option value="">All Statuses</option>
        <option value="1">Not Listed</option>
        <option value="2">Listed</option>
        <option value="3">Pending Sale</option>
        <option value="4">Shipped</option>
        <option value="5">Sold</option>
      </select>
      <select id="filterTier" onchange="renderAll()">
        <option value="">All Tiers</option>
        <option value="Tier 1">Tier 1</option>
        <option value="Tier 2">Tier 2</option>
        <option value="Tier 3">Tier 3</option>
      </select>
    </div>
    <div class="table-wrap" id="allTable"></div>
  </div>

  <!-- Open Inventory View -->
  <div id="view-open" class="view" style="display:none">
    <div class="toolbar">
      <input type="search" id="searchOpen" placeholder="Search open inventory..." oninput="renderOpen()">
      <select id="filterOpenLot" onchange="renderOpen()"><option value="">All Lots</option></select>
    </div>
    <div class="table-wrap" id="openTable"></div>
  </div>

  <!-- Sold Items View -->
  <div id="view-sold" class="view" style="display:none">
    <div class="toolbar">
      <input type="search" id="searchSold" placeholder="Search sold items..." oninput="renderSold()">
      <select id="filterSoldLot" onchange="renderSold()"><option value="">All Lots</option></select>
    </div>
    <div class="table-wrap" id="soldTable"></div>
  </div>

  <!-- Lots View -->
  <div id="view-lots" class="view" style="display:none">
    <div id="lotCards"></div>
  </div>
</div>

<!-- Lot Modal -->
<div class="modal-overlay" id="lotModal">
  <div class="modal">
    <h2 id="lotModalTitle">Add New Lot</h2>
    <div class="form-grid">
      <div class="form-group"><label>Lot / Pallet ID</label><input id="lotId" type="number" min="1"></div>
      <div class="form-group"><label>Purchase Date</label><input id="lotDate" type="date"></div>
      <div class="form-group"><label>Auction Price ($)</label><input id="lotAuction" type="number" step="0.01"></div>
      <div class="form-group"><label>Shipping & Fees ($)</label><input id="lotShipping" type="number" step="0.01" value="0"></div>
      <div class="form-group"><label>Other Costs ($)</label><input id="lotOther" type="number" step="0.01" value="0"></div>
      <div class="form-group"><label>Total Units</label><input id="lotUnits" type="number" min="1"></div>
      <div class="form-group full"><label>Notes</label><input id="lotNotes" type="text" placeholder="Optional notes about this lot"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeLotModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLot()">Save Lot</button>
    </div>
  </div>
</div>

<!-- Item Modal -->
<div class="modal-overlay" id="itemModal">
  <div class="modal">
    <h2>Add New Item</h2>
    <div class="form-grid">
      <div class="form-group"><label>Lot / Pallet ID</label><select id="itemLot"></select></div>
      <div class="form-group"><label>Category</label>
        <select id="itemCategory">
          <option>Electronics</option><option>Home & Kitchen</option><option>Tools</option><option>Toys</option><option>Clothing</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><label>Brand</label><input id="itemBrand" type="text"></div>
      <div class="form-group"><label>Model</label><input id="itemModel" type="text"></div>
      <div class="form-group"><label>MSRP ($)</label><input id="itemMSRP" type="number" step="0.01"></div>
      <div class="form-group"><label>Powers On?</label>
        <select id="itemPowers"><option>Not Tested (Sealed)</option><option>Yes</option><option>No</option></select>
      </div>
      <div class="form-group"><label>Core Function Works?</label>
        <select id="itemFunction"><option>Not Tested (Sealed)</option><option>Yes</option><option>No</option></select>
      </div>
      <div class="form-group"><label>Accessories Included?</label>
        <select id="itemAccessories"><option>Yes</option><option>No</option><option>Partial</option></select>
      </div>
      <div class="form-group"><label>Missing Items</label><input id="itemMissing" type="text" placeholder="e.g., Box, Remote"></div>
      <div class="form-group"><label>Cosmetic Grade</label>
        <select id="itemCosmetic"><option>A</option><option>B</option><option>C</option></select>
      </div>
      <div class="form-group"><label>Functional Grade</label>
        <select id="itemFunctional"><option>A (Sealed)</option><option>A</option><option>B</option><option>C</option></select>
      </div>
      <div class="form-group full"><label>Notes</label><input id="itemNotes" type="text" placeholder="Optional notes"></div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeItemModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
